# signals.toml — declarative signal database for this ECU.
#
# Each signal describes a bit-range within a frame payload. The accompanying
# `src/main.rs` decodes/encodes them using `tpt_chassis_core::autosar::Signal`.

[[signal]]
name = "LaneOffsetCm"
can_id = 0x200
start_bit = 0
length_bits = 16
# signed = true means the value is interpreted as two's complement.
signed = true

[[signal]]
name = "VehicleSpeedCmps"
can_id = 0x201
start_bit = 0
length_bits = 16
signed = false

[[signal]]
name = "SteerCmdDeciDeg"
can_id = 0x300
start_bit = 0
length_bits = 16
signed = true

[[signal]]
name = "EstopActive"
can_id = 0x301
start_bit = 0
length_bits = 1
signed = false
