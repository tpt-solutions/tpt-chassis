name: Bug report
description: Report a defect in TPT Chassis
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Related phase
      description: Which phase of the roadmap (todo.md) does this relate to?
      options:
        - Phase 0 — Project Setup
        - Phase 1 — CAN Bus Abstraction
        - Phase 2 — Ethernet/LIN
        - Phase 3 — AUTOSAR Interface
        - Phase 4 — OTA Engine
        - Phase 5 — Autonomous Interface
        - Phase 6 — RTOS Integration
        - Phase 7 — Hardware Bring-Up
        - Other / Unknown
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Toolchain version, target, OS, commit hash, etc.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety note
      options:
        - label: This report does not involve a safety-critical defect that requires confidential disclosure.
